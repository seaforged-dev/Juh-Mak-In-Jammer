[platformio]
default_envs = t3s3

[env:t3s3]
platform = espressif32
board = lilygo-t3-s3
framework = arduino
monitor_speed = 115200
build_flags =
    -DBOARD_T3S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DJAMMER_MODE=1
lib_deps =
    jgromes/RadioLib@^7.0.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
board_build.partitions = huge_app.csv
